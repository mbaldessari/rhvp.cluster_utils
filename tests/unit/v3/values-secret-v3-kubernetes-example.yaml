version: "3.0"
secretstore: "kubernetes"

settings:
  namespace: "validated-patterns-secrets"

secrets:
  database:
    namespaces: "app-namespace"
    type: "Opaque"
    labels:
      environment: "production"
      component: "database"
    annotations:
      database.io/connection-pool: "enabled"
    username: "dbuser"
    password: "prompt:Enter database password"
    ca_cert: "file://test-file-contents"

  docker-registry:
    namespaces: ["default", "app1", "app2"]
    type: "kubernetes.io/dockerconfigjson"
    labels:
      registry: "production"
    .dockerconfigjson: "file+base64://test-file-contents"

  tls-wildcard:
    namespaces: ["ingress-nginx", "istio-system"]
    type: "kubernetes.io/tls"
    labels:
      cert-type: "wildcard"
    tls.crt: "file://test-file-contents"
    tls.key: "file://test-file-contents"

  shared-config:
    # Uses default namespace from settings
    labels:
      shared: "true"
    api_key: "ini://test-ini-example.ini:default:test_key"