version: "3.0"
secretstore: "aws-secrets-manager"

awsConfig:
  region: "us-east-1"
  profile: "default"
  prefix: "myapp/prod/"

  defaultKmsKeyId: "alias/aws/secretsmanager"
  defaultTags:
    Environment: "production"
    ManagedBy: "validated-patterns"
    Source: "values-secret-v3"

secrets:
  database:
    secretName: "rds/credentials"
    description: "Database credentials for production app"
    tags:
      Application: "myapp"
      Component: "database"
    username: "dbuser"
    password: "prompt:Enter database password"
    host: "ini://test-ini-example.ini:default:test_key"
    ca_cert: "file://test-file-contents"
    ssl_cert:
      value: "file+base64://path/to/ssl-cert.pem"
      optional: true

  api-config:
    description: "API configuration and tokens"
    tags:
      Application: "myapp"
      Component: "api"
    endpoint: "https://api.example.com"
    token: "prompt:Enter API token"
    config: "file+base64://test-file-contents"

  tls-certificates:
    secretName: "certificates/wildcard-tls"
    description: "Wildcard TLS certificate"
    kmsKeyId: "alias/high-security-key"
    tags:
      CertType: "wildcard"
    tls_crt: "file://test-file-contents"
    tls_key: "file://test-file-contents"

  auto-rotate-secret:
    secretName: "rds/auto-rotate"
    description: "Auto-rotating database secret"
    automaticRotation:
      enabled: true
      rotationSchedule: "rate(30 days)"
      rotationLambdaArn: "arn:aws:lambda:us-east-1:123456789012:function:SecretsManagerRotation"
    username: "autouser"
    password: "prompt:Enter initial password"