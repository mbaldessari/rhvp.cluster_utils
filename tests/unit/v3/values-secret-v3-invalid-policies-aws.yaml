version: "3.0"
secretstore: "aws-secrets-manager"

# This should be invalid - policies are only valid with vault secretstore
policies:
  custom:
    length: 16
    charset: "alphanumeric"

awsConfig:
  region: "us-east-1"
  profile: "default"

secrets:
  database:
    secretName: "rds/credentials"
    username: "dbuser"
    password: "prompt:Enter password"