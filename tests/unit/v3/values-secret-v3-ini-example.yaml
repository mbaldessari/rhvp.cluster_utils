version: "3.0"

settings:
  targets: ["hub"]
  namespace: "validated-patterns-secrets"

secrets:
  aws:
    # Load AWS credentials from standard locations
    access_key: "ini://~/.aws/credentials:default:aws_access_key_id"
    secret_key: "ini://~/.aws/credentials:default:aws_secret_access_key"
    region: "ini://~/.aws/config:region"  # Uses default section

  database:
    # Mix ini:// with other instruction types
    host: "ini://~/app.conf:database:host"
    port: "ini://~/app.conf:database:port"
    password: "generate:strong"  # Generate instead of reading from file
    username: "dbuser"  # Static value

  api-config:
    targets: ["prod-cluster"]
    # Custom section example
    endpoint: "ini://~/config.ini:production:api_endpoint"
    key: "ini://~/config.ini:production:api_key"