version: "3.0"
secretstore: "aws-secrets-manager"

# AWS configuration
awsConfig:
  region: "us-east-1"
  prefix: "test-pattern/"
  defaultTags:
    Environment: "test"
    Project: "validated-patterns"
    ManagedBy: "integration-test"

# Test secrets for AWS Secrets Manager backend
secrets:
  aws-test-database:
    secretName: "database/credentials"
    description: "Database credentials for testing"
    tags:
      Application: "test-app"
      Component: "database"
    username: "aws-db-user"
    password: "aws-db-password-123"
    host: "rds.example.com"
    port: "5432"
    database: "testdb"

  aws-test-ini-base64:
    secretName: "config/ini-base64-test"
    description: "Testing ini+base64:// functionality with AWS"
    tags:
      TestType: "ini-base64"
      Component: "config"
    plain_value: "ini://test-config.ini:api_key"
    encoded_value: "ini+base64://test-config.ini:auth_token"
    encoded_with_section: "ini+base64://test-config.ini:docker:registry_auth"
    database_connection: "ini+base64://test-config.ini:database:connection_string"
    password_from_ini: "ini+base64://test-config.ini:database:password"

  aws-test-registry:
    secretName: "registry/auth-config"
    description: "Container registry authentication using ini+base64"
    kmsKeyId: "alias/aws/secretsmanager"
    tags:
      Application: "test-app"
      Component: "registry"
    registry_url: "registry.example.com"
    username: "ini://test-config.ini:docker:username"
    auth_data: "ini+base64://test-config.ini:docker:registry_auth"

  aws-test-api-keys:
    description: "API keys and tokens with base64 encoding"
    tags:
      Component: "api"
      Security: "high"
    api_key: "ini://test-config.ini:api_key"
    auth_header: "ini+base64://test-config.ini:auth_token"
    region: "ini://test-config.ini:region"