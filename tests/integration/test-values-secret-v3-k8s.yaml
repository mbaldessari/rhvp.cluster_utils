version: "3.0"
secretstore: "kubernetes"

# Global settings for Kubernetes
settings:
  namespace: "test-secrets"

# Test secrets for Kubernetes backend
secrets:
  k8s-test-database:
    namespaces: ["test-secrets", "app-namespace"]
    type: "Opaque"
    labels:
      app: "database"
      environment: "test"
    annotations:
      description: "Database credentials for testing"
    username: "db-user"
    password: "db-secret-password"
    host: "localhost"
    port: "5432"

  k8s-test-ini-base64:
    namespaces: "test-secrets"
    type: "Opaque"
    labels:
      app: "config-test"
      test-type: "ini-base64"
    plain_value: "ini://test-config.ini:api_key"
    encoded_value: "ini+base64://test-config.ini:auth_token"
    encoded_with_section: "ini+base64://test-config.ini:docker:registry_auth"
    database_connection: "ini+base64://test-config.ini:database:connection_string"

  k8s-test-registry:
    namespaces: ["test-secrets"]
    type: "kubernetes.io/dockerconfigjson"
    labels:
      app: "registry"
    registry_url: "registry.example.com"
    username: "ini://test-config.ini:docker:username"
    auth_data: "ini+base64://test-config.ini:docker:registry_auth"