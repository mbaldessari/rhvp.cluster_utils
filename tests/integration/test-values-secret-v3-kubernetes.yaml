version: "3.0"
secretstore: "kubernetes"

settings:
  namespace: "test-secrets"

secrets:
  database-credentials:
    username: "db-user"
    password: "prompt:Database password"
    host: "postgres.example.com"
    port: "5432"
    database: "myapp"
    namespaces: ["default", "test-namespace"]
    type: "Opaque"
    labels:
      app: "myapp"
      component: "database"
    annotations:
      created-by: "validated-patterns"
      description: "Database credentials for myapp"

  api-credentials:
    username: "api-user"
    token: "file://./test-api-token.txt"
    endpoint: "https://api.example.com"
    namespaces: "production"
    type: "kubernetes.io/basic-auth"
    labels:
      app: "myapp"
      component: "api"

  static-config:
    config_value: "test-config"
    environment: "testing"
    debug: true
    max_connections: 100
    # Uses default namespace from settings
    type: "Opaque"

  file-based-secret:
    certificate: "file+base64://./test-cert.pem"
    private_key: "file+base64://./test-key.pem"
    ca_bundle: "file://./test-ca.pem"
    namespaces: ["kube-system"]
    type: "kubernetes.io/tls"
    labels:
      usage: "tls"