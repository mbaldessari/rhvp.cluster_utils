version: "3.0"
secretstore: "vault"

policies:
  test-basic:
    length: 8
    charset: "alphanumeric"
  test-strong:
    length: 16
    charset: "alphanumeric_symbols"

settings:
  targets: ["hub", "test-spoke"]

secrets:
  integration-test-missing-files:
    # This secret has fields that will fail
    username: "test-db-user"
    password: "generate:test-basic"
    missing_file: "file:///path/that/does/not/exist.txt"
    missing_ini: "ini:///path/that/does/not/exist.ini:section:key"
    valid_host: "localhost"
    valid_port: 5432

  integration-test-optional-fields:
    # This secret has optional fields that will fail
    username: "api-user"
    token: "generate:test-strong"
    optional_missing_file:
      value: "file:///path/that/does/not/exist.txt"
      optional: true
    optional_missing_ini:
      value: "ini:///path/that/does/not/exist.ini:section:key"
      optional: true
    endpoint: "https://api.test.example.com"

  integration-test-all-valid:
    # This secret should work fine
    username: "valid-user"
    password: "generate:test-basic"
    endpoint: "https://valid.example.com"
    timeout: 30