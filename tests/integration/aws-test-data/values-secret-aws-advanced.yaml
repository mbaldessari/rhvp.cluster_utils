---
version: "3.0"
secretstore: aws-secrets-manager

awsConfig:
  prefix: "myapp/prod/"
  region: us-west-2
  defaultKmsKeyId: alias/myapp-secrets-key
  defaultTags:
    Environment: production
    Team: platform
    ManagedBy: validated-patterns
  replicationRegions:
    - region: us-east-1
      kmsKeyId: alias/myapp-secrets-key-east

secrets:
  database:
    secretName: rds/main-db
    description: Main database credentials with automatic rotation
    kmsKeyId: alias/database-key
    tags:
      Application: myapp
      Component: database
      Environment: production
    automaticRotation:
      enabled: true
      rotationSchedule: "rate(30 days)"
      rotationLambdaArn: arn:aws:lambda:us-west-2:123456789012:function:SecretsManagerRotation
    # Secret fields
    username: dbadmin
    password: complex-password-123!
    host: prod-cluster.cluster-xyz.us-west-2.rds.amazonaws.com
    port: 5432
    database: myapp_prod

  api-keys:
    description: External API keys and configuration
    tags:
      Application: myapp
      Component: integrations
    # Different field types
    github_api_key: ghp_example123456789
    slack_webhook_url: https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX
    stripe_public_key: pk_test_example123
    stripe_secret_key: sk_test_example456

  certificates:
    description: SSL certificates and keys
    tags:
      Application: myapp
      Component: security
    # File-based fields (would reference actual files in real usage)
    ssl_cert: |
      -----BEGIN CERTIFICATE-----
      MIIDXTCCAkWgAwIBAgIJAKoK/heBjcOuMA0GCSqGSIb3DQEBBQUAMEUxCzAJBgNV
      BAYTAkFVMRMwEQYDVQQIDApTb21lLVN0YXRlMSEwHwYDVQQKDBhJbnRlcm5ldCBX
      aWRnaXRzIFB0eSBMdGQwHhcNMTExMjMxMDg1OTU5WhcNMTIxMjMwMDg1OTU5WjBF
      MQswCQYDVQQGEwJBVTETMBEGA1UECAwKU29tZS1TdGF0ZTEhMB8GA1UECgwYSW50
      ZXJuZXQgV2lkZ2l0cyBQdHkgTHRkMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIB
      CgKCAQEAwuSJjrBaJz3wPBzWNlNcnJyTzojb5l/Lj5UfBc5j7hPcQh+AclBGJUKD
      -----END CERTIFICATE-----
    ssl_key: |
      -----BEGIN PRIVATE KEY-----
      MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQDC5ImOsFonPfA8
      HNY2U1ycnJPOiNvmX8uPlR8FzmPuE9xCH4ByUEYlQoPA8YJ7J+9KJ3JY5uA6gH3h
      example-private-key-content
